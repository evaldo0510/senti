    <script>
      // Patch window.fetch to allow setter access inside sandbox environment
      try {
        const originalFetch = window.fetch;
        let pFetch = originalFetch;
        Object.defineProperty(window, 'fetch', {
          get: () => pFetch,
          set: (v) => { pFetch = v; },
          configurable: true,
          enumerable: true
        });
      } catch (e) {
        console.warn('Could not patch window.fetch setter:', e);
      }
    </script>
    <script src="https://meet.jit.si/external_api.js"></script>
